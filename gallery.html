  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <button class="lb-btn lb-close" aria-label="Close (Esc)">&times;</button>
    <button class="lb-btn lb-prev" aria-label="Previous image">&lsaquo;</button>
    <button class="lb-btn lb-next" aria-label="Next image">&rsaquo;</button>
    <figure class="lb-figure">
      <img class="lb-img" src="" alt="">
      <figcaption class="lb-cap"></figcaption>
    </figure>
  </div>

  <script>
  /* masonry layout */
  (function(){
    var grid = document.querySelector('.masonry');
    if(!grid) return;
    var items = Array.prototype.slice.call(grid.querySelectorAll('.m-item'));
    var GAP = 14, MINCOL = 240;
    grid.classList.add('js');
    function layout(){
      var W = grid.clientWidth;
      var cols = Math.max(1, Math.floor((W + GAP) / (MINCOL + GAP)));
      var colW = (W - GAP*(cols-1)) / cols;
      var heights = new Array(cols).fill(0);
      items.forEach(function(it){
        var ar = parseFloat(it.getAttribute('data-ar')) || 0.75;
        var h = colW * ar;
        var min = 0, k;
        for(k=1;k<cols;k++){ if(heights[k] < heights[min]) min = k; }
        it.style.width = colW + 'px';
        it.style.transform = 'translate(' + (min*(colW+GAP)) + 'px,' + heights[min] + 'px)';
        heights[min] += h + GAP;
      });
      var tallest = heights[0];
      for(var k2=1;k2<cols;k2++){ if(heights[k2] > tallest) tallest = heights[k2]; }
      grid.style.height = tallest + 'px';
    }
    var dirty = false, raf;
    function refine(img, it){
      if(img.naturalWidth && img.naturalHeight){
        var real = (img.naturalHeight/img.naturalWidth).toFixed(4);
        if(real !== it.getAttribute('data-ar')){ it.setAttribute('data-ar', real); dirty = true; }
      }
      if(!raf){ raf = requestAnimationFrame(function(){ raf=0; if(dirty){ dirty=false; layout(); } }); }
    }
    layout();
    items.forEach(function(it){
      var img = it.querySelector('img');
      if(img.complete) refine(img, it);
      else img.addEventListener('load', function(){ refine(img, it); });
    });
    var t;
    window.addEventListener('resize', function(){ clearTimeout(t); t = setTimeout(layout, 120); });
  })();

  /* lightbox */
  (function(){
    var links = Array.prototype.slice.call(document.querySelectorAll('.masonry .m-link'));
    if(!links.length) return;
    var lb = document.getElementById('lightbox');
    var lbImg = lb.querySelector('.lb-img');
    var lbCap = lb.querySelector('.lb-cap');
    var idx = 0;
    function preload(i){ if(i<0||i>=links.length) return; var im = new Image(); im.src = links[i].getAttribute('href'); }
    function render(){
      var a = links[idx];
      lbImg.src = a.getAttribute('href');
      lbImg.alt = a.getAttribute('data-project');
      lbCap.innerHTML = '<a href="'+a.getAttribute('data-page')+'">'+a.getAttribute('data-project')+' &rarr;</a>'
        + ' &nbsp;&middot;&nbsp; <span class="idx">'+(idx+1)+' / '+links.length+'</span>';
      preload(idx+1); preload(idx-1);
    }
    function open(i){ idx=i; render(); lb.classList.add('open'); lb.setAttribute('aria-hidden','false'); document.body.classList.add('lb-open'); }
    function close(){ lb.classList.remove('open'); lb.setAttribute('aria-hidden','true'); document.body.classList.remove('lb-open'); lbImg.src=''; }
    function go(d){ idx=(idx+d+links.length)%links.length; render(); }
    links.forEach(function(a,i){ a.addEventListener('click', function(e){ e.preventDefault(); open(i); }); });
    lb.querySelector('.lb-close').addEventListener('click', close);
    lb.querySelector('.lb-prev').addEventListener('click', function(e){ e.stopPropagation(); go(-1); });
    lb.querySelector('.lb-next').addEventListener('click', function(e){ e.stopPropagation(); go(1); });
    lb.addEventListener('click', function(e){ if(e.target === lb) close(); });
    document.addEventListener('keydown', function(e){
      if(!lb.classList.contains('open')) return;
      if(e.key === 'Escape') close();
      else if(e.key === 'ArrowLeft') go(-1);
      else if(e.key === 'ArrowRight') go(1);
    });
    var x0 = null;
    lb.addEventListener('touchstart', function(e){ x0 = e.touches[0].clientX; }, {passive:true});
    lb.addEventListener('touchend', function(e){ if(x0===null) return; var dx = e.changedTouches[0].clientX - x0; if(Math.abs(dx) > 40) go(dx<0?1:-1); x0=null; });
  })();
  </script>
